<text x="610" y="220" text-anchor="middle" font-family="Arial" font-size="38" font-weight="700" fill="#121212">Boi duong de ho so nhanh hon</text>
<text x="610" y="315" text-anchor="middle" font-family="Arial" font-size="24" fill="#8B8B8B">Dau hieu nhung nhieu va vu loi trong hoat dong cong vu.</text>
<text x="610" y="420" text-anchor="middle" font-family="Arial" font-size="22" fill="#121212">Nhan dien dau hieu - Phan tich rui ro - Goi y hanh dong dung phap ly</text>
