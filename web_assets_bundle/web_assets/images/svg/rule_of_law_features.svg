<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" fill="none">

<rect width="1400" height="900" fill="#F6F2EA"/>
<text x="700" y="95" text-anchor="middle" font-family="Arial" font-size="42" font-weight="700" fill="#7A1F1F">DAC TRUNG CUA NHA NUOC PHAP QUYEN XHCN</text>
<rect x="120" y="180" width="360" height="170" rx="20" fill="white" stroke="#D8CFC1"/>
<text x="300" y="240" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#121212">HIEN PHAP, PHAP LUAT</text>
<text x="300" y="285" text-anchor="middle" font-family="Arial" font-size="19" fill="#8B8B8B">To chuc va hoat dong tren co so Hien phap va phap luat</text>
<rect x="520" y="180" width="360" height="170" rx="20" fill="white" stroke="#D8CFC1"/>
<text x="700" y="240" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#121212">QUYEN LUC THONG NHAT</text>
<text x="700" y="285" text-anchor="middle" font-family="Arial" font-size="19" fill="#8B8B8B">Nhung co phan cong, phoi hop va kiem soat</text>
<rect x="920" y="180" width="360" height="170" rx="20" fill="white" stroke="#D8CFC1"/>
<text x="1100" y="240" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#121212">QUYEN CON NGUOI</text>
<text x="1100" y="285" text-anchor="middle" font-family="Arial" font-size="19" fill="#8B8B8B">Gan voi bao dam quyen cong dan trong thuc te</text>
<rect x="120" y="470" width="360" height="170" rx="20" fill="white" stroke="#D8CFC1"/>
<text x="300" y="530" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#121212">CONG KHAI, MINH BACH</text>
<text x="300" y="575" text-anchor="middle" font-family="Arial" font-size="19" fill="#8B8B8B">Tao dieu kien de xa hoi giam sat quyen luc</text>
<rect x="520" y="470" width="360" height="170" rx="20" fill="white" stroke="#D8CFC1"/>
<text x="700" y="530" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#121212">GIAI TRINH, GIAM SAT</text>
<text x="700" y="575" text-anchor="middle" font-family="Arial" font-size="19" fill="#8B8B8B">Buoc nguoi co quyen luc chiu trach nhiem</text>
<rect x="920" y="470" width="360" height="170" rx="20" fill="white" stroke="#D8CFC1"/>
<text x="1100" y="530" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#121212">PHONG CHONG THAM NHUNG</text>
<text x="1100" y="575" text-anchor="middle" font-family="Arial" font-size="19" fill="#8B8B8B">La dieu kien de cung co Nha nuoc phap quyen</text>

</svg>